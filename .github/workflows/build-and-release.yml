name: Build and Release LANSpark

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      custom_version:
        description: 'Manual Version Number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    # ایجاد پوشه منابع و خلق پویا و هنری آیکون LANSpark به صورت باینری با رفع خطای کستینگ پاورشل
    - name: Generate Dynamic App Icon
      shell: pwsh
      run: |
        # ۱. ساخت دایرکتوری در صورت عدم وجود
        New-Item -ItemType Directory -Force -Path src/UI/Resources/

        # ۲. استفاده از کتابخانه گرافیکی ویندوز برای طراحی اختصاصی آیکون
        Add-Type -AssemblyName System.Drawing
        $bmp = New-Object System.Drawing.Bitmap(32, 32)
        $g = [System.Drawing.Graphics]::FromImage($bmp)
        $g.SmoothingMode = [System.Drawing.Drawing2D.SmoothingMode]::AntiAlias
        
        # رنگ‌آمیزی پس‌زمینه با تم تاریک برنامه (#121212)
        $g.Clear([System.Drawing.Color]::FromArgb(255, 18, 18, 18))
        
        # رسم یک دایره لوکس با تم آبی فلوئنت ویندوز (#0078D4)
        $brushCircle = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(255, 0, 120, 212))
        $g.FillEllipse($brushCircle, 2, 2, 28, 28)
        
        # مشخص کردن نوع دقیق اعشاری (float) برای سایز و مختصات متن به منظور رفع خطای ابهام
        $fontSize = [float]15.0
        $font = New-Object System.Drawing.Font("Segoe UI", $fontSize, [System.Drawing.FontStyle]::Bold)
        $brushText = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::White)
        
        $xCoord = [float]8.0
        $yCoord = [float]3.0
        $g.DrawString("L", $font, $brushText, $xCoord, $yCoord)
        
        # ذخیره خروجی موقت به عنوان PNG
        $tmpPng = "temp_icon.png"
        $bmp.Save($tmpPng, [System.Drawing.Imaging.ImageFormat]::Png)
        $g.Dispose()
        $bmp.Dispose()

        # ۳. بسته‌بندی فایل PNG درون فرمت استاندارد آیکون ویندوز (ICO Wrapper)
        $pngBytes = [System.IO.File]::ReadAllBytes($tmpPng)
        $icoStream = New-Object System.IO.FileStream "src/UI/Resources/app_icon.ico", Create
        $binaryWriter = New-Object System.IO.BinaryWriter $icoStream
        
        # نوشتن هدر استاندارد ICO
        $binaryWriter.Write([UInt16]0)
        $binaryWriter.Write([UInt16]1)
        $binaryWriter.Write([UInt16]1)
        $binaryWriter.Write([Byte]32)
        $binaryWriter.Write([Byte]32)
        $binaryWriter.Write([Byte]0)
        $binaryWriter.Write([Byte]0)
        $binaryWriter.Write([UInt16]1)
        $binaryWriter.Write([UInt16]32)
        $binaryWriter.Write([UInt32]$pngBytes.Length)
        $binaryWriter.Write([UInt32]22)
        $binaryWriter.Write($pngBytes)
        
        $binaryWriter.Close()
        $icoStream.Close()
        Remove-Item $tmpPng
        
        Write-Host "Success: Dynamic LANSpark Icon Created Successfully without Ambiguity!"

    - name: Restore Dependencies
      run: dotnet restore src/LANSpark.csproj

    - name: Determine Version
      id: get_version
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $ver = "${{ github.event.inputs.custom_version }}"
        } else {
          $ver = "${{ github.ref_name }}".Replace("v", "")
        }
        echo "BUILD_VERSION=$ver" >> $env:GITHUB_ENV

    - name: Publish App
      shell: pwsh
      run: |
        dotnet publish src/LANSpark.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -p:Version=${{ env.BUILD_VERSION }} -o ./publish

    - name: Create Zip Package
      shell: pwsh
      run: |
        Compress-Archive -Path ./publish/* -DestinationPath ./LANSpark-v${{ env.BUILD_VERSION }}-Portable.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ env.BUILD_VERSION }}
        name: LANSpark v${{ env.BUILD_VERSION }}
        draft: false
        prerelease: false
        files: ./LANSpark-v${{ env.BUILD_VERSION }}-Portable.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
